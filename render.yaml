services:
  - type: web
    name: b2b-dreams-backend
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_CLIENT_ID
        sync: false
      - key: AUTH0_CLIENT_SECRET
        sync: false
      - key: AUTH0_CALLBACK_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
      - key: AUTH0_SS_PROFILE_ID_XERO
        sync: false
      - key: AUTH0_SS_PROFILE_ID_MYOB
        sync: false
